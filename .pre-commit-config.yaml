repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--exclude-files", "^\\.env\\.example$"]

  - repo: local
    hooks:
      - id: detect-personal-absolute-paths
        name: Detect hardcoded personal absolute paths
        entry: '(/Users/[A-Za-z0-9_.-]+/|/home/[A-Za-z0-9_.-]+/|[A-Za-z]:\\\\Users\\\\[A-Za-z0-9_.-]+\\\\)'
        language: pygrep
        types: [text]

  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout
